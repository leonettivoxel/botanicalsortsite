<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover">
    <title>Unity Web Player | Botania Sorter</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        background: #272317;
      }

      #unity-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        background: #272317;
      }

      #unity-canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #272317;
        touch-action: none;
      }

      @supports (padding: env(safe-area-inset-top)) {
        #unity-container {
          padding-top: env(safe-area-inset-top);
          padding-right: env(safe-area-inset-right);
          padding-bottom: env(safe-area-inset-bottom);
          padding-left: env(safe-area-inset-left);
          box-sizing: border-box;
        }
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <script src="Build/docs.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var unityInstance = null;

      function sizeCanvas() {
        var container = document.querySelector("#unity-container");
        var width = Math.max(1, Math.floor(container.clientWidth));
        var height = Math.max(1, Math.floor(container.clientHeight));

        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        canvas.width = width;
        canvas.height = height;

        if (unityInstance && unityInstance.Module && unityInstance.Module.setCanvasSize) {
          unityInstance.Module.setCanvasSize(width, height);
        }
      }

      window.addEventListener("resize", sizeCanvas);
      window.addEventListener("orientationchange", function () {
        window.setTimeout(sizeCanvas, 100);
      });

      sizeCanvas();

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/docs.data",
        frameworkUrl: "Build/docs.framework.js",
        codeUrl: "Build/docs.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "LeoMakesShitForYou",
        productName: "Botania Sorter",
        productVersion: "1.0",
        matchWebGLToCanvasSize: false,
        devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2)
      }).then(function (instance) {
        unityInstance = instance;
        sizeCanvas();
      }).catch(function (message) {
        alert(message);
      });
    </script>
  </body>
</html>
